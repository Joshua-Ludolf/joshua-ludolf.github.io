    <script type="text/javascript">
      // GitHub Pages SPA fallback support (pairs with /404.html).
      // If we land on /?/some/path, rewrite the URL back to /some/path
      // so Vue Router (history mode) can take over.
      (function (location) {
        if (location.search && location.search.startsWith('?/')) {
          const decoded = location.search
            .slice(2)
            .split('&')
            .map((s) => s.replace(/~and~/g, '&'))
            .join('?')
          window.history.replaceState(null, '', location.pathname + decoded + location.hash)
        }
      })(window.location)
    </script>
